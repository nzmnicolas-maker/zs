name: PontoFácil Ultra Deployment

on:
  push:
    branches: [ "principal" ] # Sincronizado com a sua branch que aparece na imagem

concurrency:
  group: "pages"
  cancel-in-progress: true # Cancela deploys velhos na fila de forma limpa se você commitar rápido

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload dos Artefatos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Implantar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
