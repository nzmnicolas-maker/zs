<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PontoFácil">
  <meta name="theme-color" content="#0f172a">
  <title>PontoFácil - Sistema de Jornada Premium</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-accent: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.2);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #f43f5e;
      --gradient: linear-gradient(135deg, #6366f1, #a855f7);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand i {
      font-size: 24px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--surface-accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
    }

    /* Card Principal de Tempo */
    .hero-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 30px 20px;
      text-align: center;
      border: 1px solid var(--surface-accent);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    #current-date {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    #current-time {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 15px;
      font-variant-numeric: tabular-nums;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: var(--surface-accent);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--gradient);
      border-radius: 10px;
      transition: width 1s linear;
    }

    .context-status {
      font-size: 13px;
      color: var(--text-muted);
    }

    .context-status span {
      color: var(--text);
      font-weight: 600;
    }

    /* Grid de Ações Magnéticas */
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .btn-action {
      background: var(--surface);
      border: 1px solid var(--surface-accent);
      color: var(--text);
      padding: 20px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: var(--transition);
    }

    .btn-action i {
      font-size: 22px;
      transition: var(--transition);
    }

    .btn-action:active {
      transform: scale(0.96);
    }

    .btn-entrada:hover, .btn-entrada.active { border-color: var(--success); color: var(--success); background: rgba(16, 185, 129, 0.05); }
    .btn-almoco-saida:hover, .btn-almoco-saida.active { border-color: var(--warning); color: var(--warning); background: rgba(245, 158, 11, 0.05); }
    .btn-almoco-retorno:hover, .btn-almoco-retorno.active { border-color: var(--primary); color: var(--primary); background: rgba(99, 102, 241, 0.05); }
    .btn-saida:hover, .btn-saida.active { border-color: var(--danger); color: var(--danger); background: rgba(244, 63, 94, 0.05); }

    /* Métricas Rápidas */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--surface-accent);
      border-radius: 12px;
      padding: 15px 10px;
      text-align: center;
    }

    .metric-card p {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .metric-card h3 {
      font-size: 16px;
      font-weight: 700;
    }

    /* Histórico Inteligente */
    .history-section {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--surface-accent);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-header h2 {
      font-size: 16px;
      font-weight: 700;
    }

    .history-actions {
      display: flex;
      gap: 8px;
    }

    .btn-secondary {
      background: var(--surface-accent);
      border: none;
      color: var(--text);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 220px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      border-left: 4px solid var(--primary);
    }

    .item-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-title {
      font-size: 14px;
      font-weight: 600;
    }

    .item-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .item-time {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* Custom Scrollbar */
    .history-list::-webkit-scrollbar { width: 5px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--surface-accent); border-radius: 10px; }

    /* Toast Notification System */
    .toast {
      position: fixed;
      bottom: 30px;
      background: var(--gradient);
      color: white;
      padding: 14px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <div class="brand">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <h1>PontoFácil</h1>
      </div>
      <div class="status-badge" id="app-status">Online</div>
    </header>

    <div class="hero-card">
      <div id="current-date">--/--/----</div>
      <div id="current-time">00:00:00</div>
      <div class="progress-container">
        <div class="progress-bar" id="main-progress"></div>
      </div>
      <div class="context-status" id="context-status">Status: <span>Disponível</span></div>
    </div>

    <div class="actions-grid">
      <button class="btn-action btn-entrada" onclick="baterPonto('Entrada')">
        <i class="fa-solid fa-play"></i>Entrada
      </button>
      <button class="btn-action btn-almoco-saida" onclick="baterPonto('Almoço Saída')">
        <i class="fa-solid fa-utensils"></i>Almoço
      </button>
      <button class="btn-action btn-almoco-retorno" onclick="baterPonto('Almoço Retorno')">
        <i class="fa-solid fa-briefcase"></i>Retorno
      </button>
      <button class="btn-action btn-saida" onclick="baterPonto('Saída')">
        <i class="fa-solid fa-stop"></i>Saída
      </button>
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <p>Hoje</p>
        <h3 id="metric-hoje">00:00</h3>
      </div>
      <div class="metric-card">
        <p>Intervalo</p>
        <h3 id="metric-almoco">00:00</h3>
      </div>
      <div class="metric-card">
        <p>Banco</p>
        <h3 id="metric-banco">00:00</h3>
      </div>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>Registros de Hoje</h2>
        <div class="history-actions">
          <button class="btn-secondary" onclick="exportarDados()"><i class="fa-solid fa-download"></i></button>
          <button class="btn-secondary" onclick="limparHistorico()"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
      <div class="history-list" id="history-list">
        </div>
    </div>
  </div>

  <div class="toast" id="toast">Ponto registrado com sucesso!</div>

  <script>
    // Configurações do App
    const JORNADA_DIARIA_MINUTOS = 480; // 8 Horas
    let registros = JSON.parse(localStorage.getItem('pontofacil_registros')) || [];

    // Áudio de Feedback Tátil/Sonoro Embutido (Base64 para rodar offline perfeitamente)
    const somClique = new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YV92T19sAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGwAbABsAGw=");

    // Relógio de Alta Precisão
    function atualizarRelogio() {
      const agora = new Date();
      const opcoesData = { weekday: 'long', day: 'numeric', month: 'short' };
      
      document.getElementById('current-date').innerText = agora.toLocaleDateString('pt-BR', opcoesData);
      document.getElementById('current-time').innerText = agora.toLocaleTimeString('pt-BR', { hour12: false });
      
      atualizarProgressoDiario();
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();

    // Sistema de Registro de Ponto Inteligente
    function baterPonto(tipo) {
      try { somClique.play(); } catch(e){}
      
      const agora = new Date();
      const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dataFormatada = agora.toLocaleDateString('pt-BR');

      const novoRegistro = { tipo, hora: horaFormatada, data: dataFormatada, timestamp: agora.getTime() };
      registros.unshift(novoRegistro);
      localStorage.setItem('pontofacil_registros', JSON.stringify(registros));

      mostrarToast(`Registrado: ${tipo} às ${horaFormatada}`);
      renderizarHistorico();
      calcularMetricas();
    }

    // Gerador de Feedbacks Visuais (Toasts)
    function mostrarToast(mensagem) {
      const toast = document.getElementById('toast');
      toast.innerText = mensaje || mensagem;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // Renderizador do Histórico Dinâmico
    function renderizarHistorico() {
      const lista = document.getElementById('history-list');
      lista.innerHTML = '';

      if (registros.length === 0) {
        lista.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding: 20px;">Nenhum ponto registrado hoje.</div>`;
        return;
      }

      registros.forEach(reg => {
        const item = document.createElement('div');
        item.className = 'history-item';
        
        let corBorda = 'var(--primary)';
        if (reg.tipo.includes('Entrada')) corBorda = 'var(--success)';
        if (reg.tipo.includes('Saída')) corBorda = 'var(--danger)';
        if (reg.tipo.includes('Almoço')) corBorda = 'var(--warning)';
        
        item.style.borderLeftColor = corBorda;
        item.innerHTML = `
          <div class="item-meta">
            <span class="item-title">${reg.tipo}</span>
            <span class="item-date">${reg.data}</span>
          </div>
          <span class="item-time">${reg.hora.substring(0,5)}</span>
        `;
        lista.appendChild(item);
      });
    }

    // Cálculo Analítico de Horas e Barra de Progresso
    function calcularMetricas() {
      const hoje = new Date().toLocaleDateString('pt-BR');
      const pontosHoje = registros.filter(r => r.data === hoje).reverse();

      let minutosTrabalhados = 0;
      let minutosAlmoco = 0;
      let statusAtual = "Disponível";

      if (pontosHoje.length > 0) {
        statusAtual = pontosHoje[pontosHoje.length - 1].tipo;
        
        // Regras de cálculo sequencial de tempos
        for (let i = 0; i < pontosHoje.length; i++) {
          if (pontosHoje[i].tipo === 'Entrada' && pontosHoje[i+1] && pontosHoje[i+1].tipo === 'Almoço Saída') {
            minutosTrabalhados += Math.round((pontosHoje[i+1].timestamp - pontosHoje[i].timestamp) / 60000);
          }
          if (pontosHoje[i].tipo === 'Almoço Saída' && pontosHoje[i+1] && pontosHoje[i+1].tipo === 'Almoço Retorno') {
            minutosAlmoco += Math.round((pontosHoje[i+1].timestamp - pontosHoje[i].timestamp) / 60000);
          }
          if (pontosHoje[i].tipo === 'Almoço Retorno' && pontosHoje[i+1] && pontosHoje[i+1].tipo === 'Saída') {
            minutosTrabalhados += Math.round((pontosHoje[i+1].timestamp - pontosHoje[i].timestamp) / 60000);
          }
        }
      }

      // Atualiza painéis na tela
      document.getElementById('metric-hoje').innerText = formatarMinutos(minutosTrabalhados);
      document.getElementById('metric-almoco').innerText = formatarMinutos(minutosAlmoco);
      document.getElementById('context-status').innerHTML = `Status: <span>${statusAtual}</span>`;

      // Cálculo de Banco de Horas Estilizado
      let saldoBanco = minutosTrabalhados - JORNADA_DIARIA_MINUTOS;
      if (pontosHoje.length < 4 && !statusAtual.includes('Saída')) saldoBanco = 0; // Só fecha saldo ao terminar o dia
      
      const sinal = saldoBanco >= 0 ? "+" : "";
      document.getElementById('metric-banco').innerText = sinal + formatarMinutos(saldoBanco);
      document.getElementById('metric-banco').style.color = saldoBanco >= 0 ? 'var(--success)' : 'var(--danger)';
    }

    function formatarMinutos(totalMinutos) {
      const absMinutos = Math.abs(totalMinutos);
      const horas = Math.floor(absMinutos / 60);
      const mins = absMinutos % 60;
      return `${horas.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
    }

    function atualizarProgressoDiario() {
      const hoje = new Date().toLocaleDateString('pt-BR');
      const pontosHoje = registros.filter(r => r.data === hoje).reverse();
      if(pontosHoje.length === 0) return;

      let entrada = pontosHoje[0].timestamp;
      let agora = new Date().getTime();
      let decorrido = Math.round((agora - entrada) / 60000);
      let porc = Math.min(100, Math.max(0, (decorrido / 540) * 100)); // Baseado em 9h de janela total
      document.getElementById('main-progress').style.width = `${porc}%`;
    }

    // Exportação Segura de Dados (Backup)
    function exportarDados() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(registros, null, 2));
      const dlAnchorElem = document.createElement('a');
      dlAnchorElem.setAttribute("href", dataStr);
      dlAnchorElem.setAttribute("download", `pontofacil_backup.json`);
      dlAnchorElem.click();
      mostrarToast("Backup exportado!");
    }

    // Reset de Fábrica do Histórico
    function limparHistorico() {
      if (confirm("Deseja apagar permanentemente todos os registros salvos?")) {
        registros = [];
        localStorage.removeItem('pontofacil_registros');
        mostrarToast("Histórico limpo!");
        renderizarHistorico();
        calcularMetricas();
      }
    }

    // DECODIFICADOR DE ATALHOS NATIVOS (Tratamento das URLs vindas do Manifest)
    function processarAtalhosURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const acao = urlParams.get('action');
      
      if (acao) {
        // Limpa os parâmetros da URL para evitar múltiplos registros ao dar F5
        window.history.replaceState({}, document.title, window.location.pathname);
        
        setTimeout(() => {
          if (acao === 'entrada') baterPonto('Entrada');
          if (acao === 'almoco_saida') baterPonto('Almoço Saída');
          if (acao === 'almoco_retorno') baterPonto('Almoço Retorno');
          if (acao === 'saida') baterPonto('Saída');
        }, 600); // Pequeno delay de carregamento estético
      }
    }

    // Monitoramento de Conectividade
    window.addEventListener('online', () => {
      const status = document.getElementById('app-status');
      status.innerText = "Online";
      status.style.borderColor = "var(--success)";
    });
    window.addEventListener('offline', () => {
      const status = document.getElementById('app-status');
      status.innerText = "Offline";
      status.style.borderColor = "var(--warning)";
    });

    // Inicialização do Ecossistema
    window.addEventListener('DOMContentLoaded', () => {
      renderizarHistorico();
      calcularMetricas();
      processarAtalhosURL();

      // Registro do Service Worker Inteligente
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('Engenharia Core: Service Worker Ativo e Operando.'))
          .catch(err => console.error('Erro de Inércia do SW:', err));
      }
    });
  </script>
</body>
</html>
