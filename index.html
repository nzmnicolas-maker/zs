<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoFácil - SaaS Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-body: #f8fafc;
            --bg-container: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            
            --navy: #0a2240;
            --cyan-blue: #00e5ff;
            --white: #ffffff;
            --orange: #f97316;
            --shadow: rgba(10, 34, 64, 0.05);
            --btn-action-bg: #00e5ff;
            --btn-action-text: #0a2240;
        }

        body.dark-mode {
            --bg-body: #0b132b;
            --bg-container: #1c2541;
            --text-main: #f8fafc;
            --text-muted: #5bc0be;
            --border-color: #3a506b;
            --input-bg: #0b132b;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.3s ease,
                        transform 0.2s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--bg-container);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px var(--shadow);
            margin-bottom: 90px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Perfil Estilo SaaS */
        .profile-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 229, 255, 0.03);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-grow: 1;
        }

        .avatar-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 2px solid var(--cyan-blue);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
            background: #cbd5e1;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--navy);
            color: white;
        }

        .user-name-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 700;
            outline: none;
            width: 80%;
            border-bottom: 1px dashed transparent;
        }

        .user-name-input:focus {
            border-bottom-color: var(--cyan-blue);
        }

        .btn-theme {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            font-size: 18px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-theme:active {
            transform: scale(0.9);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--text-main), var(--cyan-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Grid de Informações Dashboard */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 25px;
        }

        .card-banco, .card-saida-principal {
            padding: 18px 14px;
            border-radius: 18px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 8px 20px var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-banco {
            background: rgba(10, 34, 64, 0.9);
            color: var(--white);
            border-top: 3px solid var(--cyan-blue);
        }

        body.dark-mode .card-banco {
            background: #151d33;
        }

        .card-saida-principal {
            background: linear-gradient(135deg, #1c2541, #0b132b);
            color: var(--white);
            border-top: 3px solid var(--orange);
        }

        .card-saida-principal span {
            color: var(--cyan-blue);
            font-size: 22px;
            font-weight: 800;
            display: block;
            margin-top: 4px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        /* Botão Principal */
        .btn-instant {
            width: 100%;
            background: var(--btn-action-bg);
            color: var(--btn-action-text);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.25);
        }

        .btn-instant:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 229, 255, 0.4);
        }

        .btn-instant:active {
            transform: translateY(1px);
        }

        /* Bloco de Input Imponente */
        .input-group {
            margin-bottom: 25px;
            padding: 18px;
            border-radius: 18px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-align: center;
        }

        input[type="time"] {
            width: 100%;
            padding: 5px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            outline: none;
            letter-spacing: -1px;
        }

        /* Barra Elegante Fina */
        .progress-container {
            background: var(--border-color);
            border-radius: 100px;
            height: 10px;
            width: 100%;
            margin: 25px 0 10px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #0077b6, var(--cyan-blue));
            height: 100%;
            width: 0%;
            border-radius: 100px;
        }

        .progress-bar.pulsing {
            position: relative;
        }

        .progress-bar.pulsing::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: progress-glow 2s infinite;
        }

        @keyframes progress-glow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 25px;
        }

        .btn-clear {
            width: 100%;
            background: transparent;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
        }

        .btn-clear:hover {
            background: rgba(239, 68, 68, 0.05);
            border-color: #ef4444;
        }

        /* Vidro Borrado Flutuante no Centro Inferior */
        .floating-prediction-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translate(-50%, 140px);
            width: calc(100% - 40px);
            max-width: 410px;
            background: rgba(10, 34, 64, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.25);
            color: var(--white);
            text-align: center;
            padding: 16px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .floating-prediction-bar.visible {
            transform: translate(-50%, 0);
        }

        .floating-prediction-bar span {
            color: var(--cyan-blue);
            font-size: 18px;
            font-weight: 800;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profile Panel -->
        <div class="profile-panel">
            <div class="profile-info">
                <div class="avatar-wrapper" id="avatarBtn" title="Alterar foto">
                    <div id="avatarPlaceholder" class="avatar-placeholder">👤</div>
                    <img id="avatarImage" style="display: none;" alt="Foto">
                </div>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                <input type="text" id="inputNome" class="user-name-input" placeholder="Seu nome...">
            </div>
            <button id="btnTheme" class="btn-theme">🌙</button>
        </div>

        <h1>PontoFácil</h1>
        
        <!-- Info Grid -->
        <div class="info-grid">
            <div id="cardBanco" class="card-banco">Banco (--:--)</div>
            <div class="card-saida-principal">
                Hora de Ir Embora
                <span id="txtSaidaPrincipal">--:--</span>
            </div>
        </div>

        <!-- Action Button -->
        <button id="btnInstant" class="btn-instant">
            ⏱️ Registrar Entrada Agora
        </button>

        <!-- Main Input Group -->
        <div class="input-group">
            <label for="ponto1">Horário de Entrada Cadastrado</label>
            <input type="time" id="ponto1">
        </div>

        <!-- Progress indicators -->
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText" class="progress-text">Aguardando entrada...</div>

        <button class="btn-clear" id="btnLimpar">Limpar Registro</button>
    </div>

    <!-- Floating Glassmorphic Footer -->
    <div id="floatingBar" class="floating-prediction-bar">
        Previsão de Saída: <span id="previsaoHorario">--:--</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
