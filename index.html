<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoFácil - Controle de Ponto</title>
    <style>
        :root {
            --navy: #0a2240;
            --dark-gray: #282828;
            --light-gray: #f5f5f5;
            --cyan-blue: #00e5ff;
            --white: #ffffff;
            --green: #228b22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-gray);
            color: var(--dark-gray);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 80px; /* Espaço para a linha flutuante */
        }

        h1 {
            color: var(--navy);
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .card-banco {
            background: var(--navy);
            color: var(--white);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--navy);
            font-size: 14px;
        }

        input[type="time"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="time"]:focus {
            border-color: var(--navy);
        }

        /* Barra de Progresso */
        .progress-container {
            background: #eee;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin: 25px 0 10px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--navy), var(--cyan-blue));
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: var(--navy);
            margin-bottom: 15px;
        }

        .btn-clear {
            display: block;
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-clear:hover {
            background: #c0392b;
        }

        /* Linha Flutuante de Previsão de Saída (Azul-Ciano) */
        .floating-prediction-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--navy);
            border-top: 4px solid var(--cyan-blue);
            color: var(--white);
            text-align: center;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.15);
            display: none; /* Controlado via JS */
            z-index: 1000;
        }

        .floating-prediction-bar span {
            color: var(--cyan-blue);
            font-size: 18px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PontoFácil</h1>
        
        <div id="cardBanco" class="card-banco">Banco (Carregando...)</div>

        <div class="input-group">
            <label for="ponto1">1ª Batida - Entrada Manhã</label>
            <input type="time" id="ponto1">
        </div>

        <div class="input-group">
            <label for="ponto2">2ª Batida - Saída Almoço (Início)</label>
            <input type="time" id="ponto2">
        </div>

        <div class="input-group">
            <label for="ponto3">3ª Batida - Retorno Almoço (Fim)</label>
            <input type="time" id="ponto3">
        </div>

        <div class="input-group">
            <label for="ponto4">4ª Batida - Saída Final</label>
            <input type="time" id="ponto4">
        </div>

        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText" class="progress-text">Progresso: 0%</div>

        <button class="btn-clear" id="btnLimpar">Limpar Registros</button>
    </div>

    <div id="floatingBar" class="floating-prediction-bar">
        Previsão de Saída Estimada: <span id="previsaoHorario">--:--</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoFácil - Controle de Ponto</title>
    <style>
        /* Variáveis de Cores para Temas (Claro/Escuro) */
        :root {
            --bg-body: #f5f5f5;
            --bg-container: #ffffff;
            --text-main: #282828;
            --text-muted: #666666;
            --border-color: #dddddd;
            --input-bg: #ffffff;
            
            --navy: #0a2240;
            --cyan-blue: #00e5ff;
            --white: #ffffff;
            --green: #228b22;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg-body: #0f172a;
            --bg-container: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #1e293b;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--bg-container);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow);
            margin-bottom: 80px; /* Espaço para a barra flutuante */
        }

        /* Painel de Cadastro e Perfil */
        .profile-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        body.dark-mode .profile-panel {
            background: rgba(255,255,255,0.03);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        .avatar-wrapper {
            position: relative;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--cyan-blue);
            overflow: hidden;
            cursor: pointer;
            background: #ccc;
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--navy);
            color: white;
        }

        .user-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--text-muted);
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            padding: 4px;
            width: 80%;
            outline: none;
        }

        .user-name-input:focus {
            border-bottom-style: solid;
            border-bottom-color: var(--cyan-blue);
        }

        /* Botão Alternador de Tema */
        .btn-theme {
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .btn-theme:hover {
            background: rgba(0,0,0,0.05);
        }
        body.dark-mode .btn-theme:hover {
            background: rgba(255,255,255,0.1);
        }

        h1 {
            color: var(--navy);
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        body.dark-mode h1 {
            color: var(--cyan-blue);
        }

        .card-banco {
            background: var(--navy);
            color: var(--white);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 0.5px;
            border-left: 5px solid var(--cyan-blue);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 14px;
        }

        input[type="time"] {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input[type="time"]:focus {
            border-color: var(--cyan-blue);
        }

        /* Barra de Progresso */
        .progress-container {
            background: var(--border-color);
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin: 25px 0 10px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--navy), var(--cyan-blue));
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 15px;
        }

        .btn-clear {
            display: block;
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-clear:hover {
            background: #c0392b;
        }

        /* Linha Flutuante de Previsão de Saída (Azul-Ciano) */
        .floating-prediction-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--navy);
            border-top: 4px solid var(--cyan-blue);
            color: var(--white);
            text-align: center;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
        }

        .floating-prediction-bar span {
            color: var(--cyan-blue);
            font-size: 18px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Painel de Cadastro Superior com Dark Mode -->
        <div class="profile-panel">
            <div class="profile-info">
                <div class="avatar-wrapper" id="avatarBtn" title="Clique para alterar a foto">
                    <div id="avatarPlaceholder" class="avatar-placeholder">👤</div>
                    <img id="avatarImage" style="display: none;" alt="Foto de Perfil">
                </div>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                <input type="text" id="inputNome" class="user-name-input" placeholder="Clique para digitar seu nome...">
            </div>
            <button id="btnTheme" class="btn-theme" title="Alternar tema">🌙</button>
        </div>

        <h1>PontoFácil</h1>
        
        <!-- Card com jornada dinâmica -->
        <div id="cardBanco" class="card-banco">Banco (Carregando...)</div>

        <div class="input-group">
            <label for="ponto1">1ª Batida - Entrada Manhã</label>
            <input type="time" id="ponto1">
        </div>

        <div class="input-group">
            <label for="ponto2">2ª Batida - Saída Almoço (Início)</label>
            <input type="time" id="ponto2">
        </div>

        <div class="input-group">
            <label for="ponto3">3ª Batida - Retorno Almoço (Fim)</label>
            <input type="time" id="ponto3">
        </div>

        <div class="input-group">
            <label for="ponto4">4ª Batida - Saída Final</label>
            <input type="time" id="ponto4">
        </div>

        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText" class="progress-text">Progresso: 0%</div>

        <button class="btn-clear" id="btnLimpar">Limpar Registros</button>
    </div>

    <!-- Linha Flutuante Azul-Ciano -->
    <div id="floatingBar" class="floating-prediction-bar">
        Previsão de Saída Estimada: <span id="previsaoHorario">--:--</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
